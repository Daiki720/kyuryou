<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest2.json">
    <meta name="theme-color" content="#007bff">
    <title>給料管理カレンダー</title>
    <style>
        @media (max-width: 768px){

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f3f6;
            color: #333;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 14px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        /* 全体集計エリア */
        .summary-header {
            display: flex;
            flex-direction:row;
            justify-content: space-between;
            background: #e9ecef;
            padding: 10px 6px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            gap:12px;
            align-items:center;
        }
        .summary-box {
            text-align: center;
            flex:1;
        }
        .summary-box span {
            display: block;
            font-size: 10px;
            color: #666;
        }
        .summary-box div {
            font-size: 14px;
            color: #d9534f;
            margin-top: 5px;
        }
        /* カレンダーコントロール */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap:10px;
        }
       
        .calendar-nav button {
            padding: 6px 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size:12px;
        }
        .calendar-nav h2 {
            margin: 0;
            font-size: 16px;
        }
        /* カレンダーテーブル */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            font-size:11px;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 4px;
            vertical-align: top;
            height: 70px;
        }
        th {
            background: #f8f9fa;
            text-align: center;
            height: auto;
            font-size: 12px;
        }
        .day-cell {
            cursor: pointer;
            transition: background 0.2s;
        }
        .day-cell:hover {
            background: #f1f3f5;
        }
        .day-number {
            font-weight: bold;
            font-size: 12px;
        }
        .day-salary {
            margin-top: 10px;
            font-size: 10px;
            color: #28a745;
            font-weight: bold;
            text-align: right;
        }
        .day-hours {
            font-size: 9px;
            color: #777;
            text-align: right;
        }
        .other-month {
            background: #f9f9f9;
            color: #ccc;
        }
        /* 入力モーダル（ポップアップ） */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 18px;
            border-radius: 10px;
            width: 95%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .modal h3 {
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
        }
        .input-row {
            display: flex;
            flex-direction:row;
            gap: 10px;
            margin-bottom: 12px;
        }
        .input-group {
            flex: 1;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .input-group select{
            width:100%;
            padding:8px;
            border:1px solid #ccc;
            border-radius:4px;
            box-sizing:border-box;
        }
        .modal-btns {
            display: flex;
            flex-direction:row;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-save { background: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-close { background: #6c757d; color: white; }

        /* タブバー */
        .top-bar{
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            margin-bottom:20px;
            position:relative;
        }

        .top-bar h1{
            margin:0;
            text-align:center;
            width:100%;
            font-size:22px;
        }

        .settings-btn{
            width:45px;
            height:45px;
            border:none;
            border-radius:50%;
            background:#007bff;
            color:white;
            font-size:22px;
            cursor:pointer;
            position:absolute;
            right:0;
        }

        .settings-btn:hover{
            opacity:0.9;
        }

        /* 設定パネル*/
        .settings-panel{
            display:none;
            position:fixed;
            top:65px;
            right:10px;
            width:90vw;
            padding:0;
            max-width:340px;
            max-height:70vh; 
            background:white;
            border-radius:16px;
            box-shadow:0 8px 30px rgba(0,0,0,0.18);
            z-index:999;
            overflow-y:auto;
            overflow-x:hidden;
        }

        .settings-content{
            padding:12px;
            overflow-y:auto;
        }

        .settings-content h3{
            margin-top:0;
            margin-bottom:18px;
            font-size:20px;
            color:#2c3e50;
        }

        .settings-content input,
        .settings-content select{
            width:100%;
            padding:12px;
            margin-bottom:10px;
            border:1px solid #d0d7de;
            border-radius:10px;
            font-size:15px;
            box-sizing:border-box;
        }

        .settings-content button{
            width:100%;
            margin-top:8px;
        }    

        .blue-btn{
        background:#007bff;
        color:white;
        }

        .green-btn{
            background:#28a745;
            color:white;
        }

        .red-btn{
            background:#dc3545;
            color:white;
        }

        .gray-btn{
            background:#6c757d;
            color:white;
        }

        .small-btn{
            width:auto;
            padding:6px 10px;
            margin-left:auto;
            flex-shrink:0;
            font-size:11px;
        }

        #workplaceSection input{
            width:100%;
        }

        .workplace-left{
            flex:1;
            min-width:0;
            white-space:nowrap;
        }

        .workplace-card{
            background: #f4f4f4;
            border-radius:16px;
            padding:18px;
            margin-top:14px;
        }

        .workplace-row{
            display:flex;
            align-items:center;
            gap:8px;
            width:100%;
            justify-content:space-between;
        }

        .workplace-left{
            flex:1;
            min-width:0;
        }

        .workplace-name{
            min-width:auto;
            white-space:nowrap;
            font-weight:bold;
            font-size:15px;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        .workplace-info{
            white-space:nowrap;
            font-size:11px;
            color:#666;
        }

        .row{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
        }

        .right{
            flex-shrink:0;
            display:flex;
            justify-content:flex-end;
        }

        .app-btn{
            border:none;
            border-radius:10px;
            padding:12px;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
        }
    }  

    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
    <h1>給料管理カレンダー</h1>
    <button class="settings-btn" onclick="toggleSettings()"> ☰ </button>
    </div>
    
    <!-- 月間合計表示 -->
    <div class="summary-header">
        <div class="summary-box">
            <span>選択月度</span>
            <div id="currentMonthLabel">2026年05月</div>
        </div>
        <div class="summary-box">
            <span>当月 稼働日数</span>
            <div id="monthlyDays">0 日</div>
        </div>
        <div class="summary-box">
            <span>当月 給料合計 </span>
            <div id="monthlyTotal">0 円</div>
        </div>
    </div>
    
    <!-- ナビゲーション -->
    <div class="calendar-nav">
        <button onclick="changeMonth(-1)">◀ 前の月</button>
        <h2 id="calendarTitle">2026年5月</h2>
        <button onclick="changeMonth(1)">次の月 ▶</button>
    </div>
    
    <!-- カレンダー本体 -->
    <table id="calendarTable">
        <thead>
            <tr>
                <th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th>
            </tr>
        </thead>
        <tbody id="calendarBody">
            <!-- JSで動的に生成 -->
        </tbody>
    </table>
</div>

<!-- 設定パネル -->
<div class="settings-panel" id="settingsPanel">
    <div class="settings-content">
        <h3>設定</h3>
        <button class="app-btn blue-btn" onclick="toggleWorkplaceSection()">勤務先登録</button>

        <div id="workplaceSection" style="display:none; margin-top:15px;">
            <input id="workName" placeholder="勤務先名">
            <input id="workHourly" type="number" placeholder="時給">
            <input id="workTransport" type="number" placeholder="交通費">

            <button class="app-btn green-btn" onclick="addWorkplace()">追加</button>

            <div id="workplaceList" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<!-- データ入力用ポップアップ（モーダル） -->
<div class="modal" id="inputModal">
    <div class="modal-content">
        <h3 id="modalDateTitle">2026/05/17 の入力</h3>
        
        <label style="font-size:12px; font-weight:bold; color:#555;"> 勤務先</label>
        <div class="input-group">
            <select id="mWorkplace"></select>
        </div>

        <label style="font-size:12px; font-weight:bold; color:#555;"> 勤務時間</label>
        <div class="input-row">
            <div class="input-group">
                <label>出勤</label>
                <input type="time" id="mStart" value="13:00">
            </div>
            <div class="input-group">
                <label>退勤</label>
                <input type="time" id="mEnd" value="23:00">
            </div>
        </div>
        
        <label style="font-size:12px; font-weight:bold; color:#555; margin-top:10px; display:block;">休憩時間</label>
        <div class="input-row">
            <div class="input-group">
                <label>開始</label>
                <input type="time" id="mRestStart" value="17:00">
            </div>
            <div class="input-group">
                <label>終了</label>
                <input type="time" id="mRestEnd" value="18:00">
            </div>
        </div>
        
        <div class="modal-btns">
            <button class="btn-save" onclick="saveData()">保存</button>
            <button class="btn-delete" onclick="deleteData()">削除</button>
            <button class="btn-close" onclick="closeModal()">閉じる</button>
        </div>
    </div>
    
</div>

<script>

// データ保存用オブジェクト (キー: "YYYY-MM-DD")
let salaryData = JSON.parse(localStorage.getItem('salaryData')) || {};
let workplaces =JSON.parse(localStorage.getItem("workplaces"))|| [];

// 表示中の年月管理 (初期表示は現在の年月)
let today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth(); // 0 = 1月, 11 = 12月
let selectedDateStr = "";

//設定タブ
function toggleSettings(){
    const panel = document.getElementById("settingsPanel");

    if(panel.style.display === "block"){
        panel.style.display = "none";
    }else{
        panel.style.display = "block";
    }
}

function toggleWorkplaceSection(){
    const section = document.getElementById("workplaceSection");

    if(section.style.display === "none"){
        section.style.display = "block";
    }else{
        section.style.display = "none";
    }
}

//勤務先追加
function addWorkplace(){
  const name = document.getElementById("workName").value;
  const hourly = Number(document.getElementById("workHourly").value);
  const transport = Number(document.getElementById("workTransport").value) || 0;

  if(!name || !hourly){
    alert("入力してください");
    return;
  }

  // 重複チェック
  if(workplaces.some(w => w.name === name)){
    alert("同じ勤務先が既に登録されています");
    return;
  }

  workplaces.push({name,hourly,transport});

  localStorage.setItem("workplaces",JSON.stringify(workplaces));

  renderWorkplaces();

  document.getElementById("workName").value = "";
  document.getElementById("workHourly").value = "";
  document.getElementById("workTransport").value = "";
}

//勤務先一覧
function renderWorkplaces(){
  const div = document.getElementById("workplaceList");
  let html = "";

  workplaces.forEach((w,i)=>{
    html += `
    <div class="workplace-card">
        <div class="workplace-left">

            <div class="workplace-name">${w.name}</div>
            <div class="workplace-info">時給 ${w.hourly}円 ・ 交通費 ${w.transport}円</div>

        <div class="right">
            <button class="app-btn red-btn small-btn" onclick="deleteWorkplace(${i})">削除</button>
        </div>
      </div>
    </div>
    `;
  });
  document.getElementById("workplaceList").innerHTML = html;
  renderWorkplaceSelect();
}

// 給料計算ロジック 
function calculateDaySalary(data) {
    const BASE_HOURLY_WAGE = data.hourly;
    const TRANSPORTATION_FEE = data.transport;
    const startVal = data.start;
    const endVal = data.end;
    const restStartVal = data.rStart;
    const restEndVal = data.rEnd;

    if (!startVal || !endVal) {
        return { pay: 0, minutes: 0 };
    }

    const wageNormal = BASE_HOURLY_WAGE / 60;
    const wageMidnight = (BASE_HOURLY_WAGE * 1.25) / 60;
    const wageOvertime = (BASE_HOURLY_WAGE * 1.25) / 60;
    const wageMidnightOvertime = (BASE_HOURLY_WAGE * 1.50) / 60;

    function toMin(str, base = 0) {
        if (!str) return null;

        const [h, m] = str.split(':').map(Number);
        let tot = h * 60 + m;

        if (tot < base) {
            tot += 24 * 60;
        }
        return tot;
    }

    const startMin = toMin(startVal);
    const endMin = toMin(endVal, startMin);
    let rStart = toMin(restStartVal, startMin);
    let rEnd = toMin(restEndVal, rStart);

    if (rStart !== null && rEnd !== null) {
        if (rStart < startMin) {rStart = startMin;}
        if (rEnd > endMin) {rEnd = endMin;}
    }

    let actualWorkMinutes = 0;
    let salary = 0;

    for (let m = startMin; m < endMin; m++) {
        if (
            rStart !== null &&
            rEnd !== null &&
            m >= rStart &&
            m < rEnd
        ) continue;

        actualWorkMinutes++;

        const minuteOfDay = m % (24 * 60);

        const isMidnight =
            minuteOfDay >= 22 * 60 ||
            minuteOfDay < 5 * 60;
        const isOvertime = (actualWorkMinutes > 8 * 60);

        if (isMidnight && isOvertime) {salary += wageMidnightOvertime;}
        else if (isOvertime) {salary += wageOvertime;}
        else if (isMidnight) {salary += wageMidnight;}
        else {salary += wageNormal;}
    }

    return {
        pay:
            actualWorkMinutes > 0
                ? Math.round(salary) + TRANSPORTATION_FEE
                : 0,

        minutes: actualWorkMinutes
    };
}

// カレンダーの生成
function generateCalendar(year, month) {
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    
    // 表示見出しの更新
    document.getElementById('calendarTitle').innerText = `${year}年${month + 1}月`;
    document.getElementById('currentMonthLabel').innerText = `${year}年${String(month + 1).padStart(2, '0')}月`;
    
     const tbody = document.getElementById('calendarBody');
    tbody.innerHTML = "";
    
    // 月初めの曜日に合わせるためのオフセット
    let startOffset = firstDay.getDay();
    let dateCursor = new Date(year, month, 1 - startOffset);
    
    let monthlyTotalPay = 0;
    let monthlyDaysCount = 0;
    
    // 最大6週間分ループ
    for (let w = 0; w < 6; w++) {
        // 土曜日を過ぎて、かつ次の月に入っていればループを抜ける
        if (w > 0 && dateCursor.getMonth() !== month) break;
        
        let tr = document.createElement('tr');
        
        // 日曜〜土曜の7日間分
        for (let d = 0; d < 7; d++) {
            let td = document.createElement('td');
            const dateStr = formatDate(dateCursor);
            
            td.className = "day-cell";
            if (dateCursor.getMonth() !== month) {
                td.classList.add('other-month');
            }
            
            // 日付数字
            let numDiv = document.createElement('div');
            numDiv.className = "day-number";
            numDiv.innerText = dateCursor.getDate();
            td.appendChild(numDiv);
            
            // 登録データの反映
            if (salaryData[dateStr]) {
                const res = calculateDaySalary(
                    salaryData[dateStr]
                );
                
                if (res.pay > 0) {
                    let salDiv = document.createElement('div');
                    salDiv.className = "day-salary";
                    salDiv.innerText = `￥${res.pay.toLocaleString()}`;
                    td.appendChild(salDiv);
                    
                    let hoursDiv = document.createElement('div');
                    hoursDiv.className = "day-hours";
                    const h = Math.floor(res.minutes / 60);
                    const m = res.minutes % 60;
                    hoursDiv.innerText = `実働 ${h}h${m}m`;
                    td.appendChild(hoursDiv);
                    
                    // 表示中当月内のデータのみ月集計に加算
                    if (dateCursor.getMonth() === month) {
                        monthlyTotalPay += res.pay;
                        monthlyDaysCount++;
                    }
                }
            }
            
            // クリックイベント
            td.onclick = (function(str) {
                return function() { openModal(str); };
            })(dateStr);
            
            tr.appendChild(td);
            dateCursor.setDate(dateCursor.getDate() + 1);
        }
        
        tbody.appendChild(tr);
    }
    
    // 月計の表示更新
    document.getElementById('monthlyTotal').innerText = `${monthlyTotalPay.toLocaleString()} 円`;
    document.getElementById('monthlyDays').innerText = `${monthlyDaysCount} 日`;
}

// 日付オブジェクトを "YYYY-MM-DD" に変換
function formatDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
}

// 月変更ナビ
function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
    } else if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
    }
    generateCalendar(currentYear, currentMonth);
}

// モーダルを開く
function openModal(dateStr){

    if(workplaces.length === 0){
        alert("先に勤務先を登録してください");
        return;
    }

    selectedDateStr = dateStr;
    document.getElementById('modalDateTitle').innerText = `${dateStr} の勤務入力`;
    
    // 既存データがあればセット、なければデフォルト値
    if (salaryData[dateStr]) {

    renderWorkplaceSelect();

    document.getElementById("mWorkplace").value =
        salaryData[dateStr].workplace || "";

    document.getElementById('mStart').value =
        salaryData[dateStr].start;

    document.getElementById('mEnd').value =
        salaryData[dateStr].end;

    document.getElementById('mRestStart').value =
        salaryData[dateStr].rStart;

    document.getElementById('mRestEnd').value =
        salaryData[dateStr].rEnd;
    }else {
        document.getElementById('mStart').value = "17:00";
        document.getElementById('mEnd').value = "23:00";
        document.getElementById('mRestStart').value = "17:00";
        document.getElementById('mRestEnd').value = "17:00";
    }
    document.getElementById('inputModal').style.display = 'flex';
    renderWorkplaceSelect();
}

// モーダルを閉じる
function closeModal() {
    document.getElementById('inputModal').style.display = 'none';
}

//選択肢表示
function renderWorkplaceSelect(){
  const select = document.getElementById("mWorkplace");
  let html = "";

  workplaces.forEach(w=>{
    html += `
    <option value="${w.name}">
      ${w.name}
    </option>
    `;
  });
  select.innerHTML = html;
}

// データの保存
function saveData() {

    if(workplaces.length === 0){
        alert("先に勤務先を登録してください");
        return;
    }

    if(!document.getElementById("mWorkplace").value){
        alert("勤務先を選択してください");
        return;
    }

    const selectedWork = workplaces.find(
    w => w.name === document.getElementById("mWorkplace").value
    );

    salaryData[selectedDateStr] = {
        workplace: selectedWork.name,
        hourly: selectedWork.hourly,
        transport: selectedWork.transport,

        start: document.getElementById('mStart').value,
        end: document.getElementById('mEnd').value,
        rStart: document.getElementById('mRestStart').value,
        rEnd: document.getElementById('mRestEnd').value
    };
    localStorage.setItem('salaryData', JSON.stringify(salaryData));
    closeModal();
    generateCalendar(currentYear, currentMonth);
}

// データの削除
function deleteData() {
    if (salaryData[selectedDateStr]) {
        delete salaryData[selectedDateStr];
        localStorage.setItem('salaryData', JSON.stringify(salaryData));
    }
    closeModal();
    generateCalendar(currentYear, currentMonth);
}
// 勤務先の削除
function deleteWorkplace(i){

  const name = workplaces[i].name;

  if(!confirm(`${name} を削除しますか？`)){
      return;
  }

  workplaces.splice(i,1);

  localStorage.setItem(
      "workplaces",
      JSON.stringify(workplaces)
  );

  renderWorkplaces();
  generateCalendar(currentYear,currentMonth);
}

// 初期実行
generateCalendar(currentYear, currentMonth);
renderWorkplaces();

window.addEventListener("click",(e)=>{
  const panel = document.getElementById("settingsPanel");
  const btn = document.querySelector(".settings-btn");

  if(
    panel.style.display === "block" &&
    !panel.contains(e.target) &&
    !btn.contains(e.target)
  ){
    panel.style.display = "none";
  }
});



if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js")
    .then(() => {
      console.log("Service Worker 登録成功");
    })
    .catch(err => {
      console.log("Service Worker 登録失敗", err);
    });
}

</script>
